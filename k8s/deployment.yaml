apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-app
  namespace: default
  labels:
    app: weather-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-app
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      containers:
        - name: weather-app
          image: satyabrat-eng/weather-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: WEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-app-secret
                  key: WEATHER_API_KEY
            - name: WEATHER_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: weather-app-config
                  key: WEATHER_API_BASE_URL
            - name: WEATHER_API_UNITS
              valueFrom:
                configMapKeyRef:
                  name: weather-app-config
                  key: WEATHER_API_UNITS
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: weather-app-config
                  key: SERVER_PORT
          readinessProbe:
            httpGet:
              path: /api/weather?city=London
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/weather?city=London
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
